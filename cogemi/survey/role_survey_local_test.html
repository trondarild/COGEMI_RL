<!DOCTYPE html>
<!--
  LOCAL TEST VERSION — COGEMI Role-Indexed Justice Survey
  Open directly in a browser. No server or Google account needed.

  Role assignment:
    URL param ?role=agent / ?role=target / ?role=observer
    If omitted, role is randomly assigned.

  Responses saved to localStorage["cogemi_role_responses"].
  Debug panel (bottom-right) shows each response + attention-check results.
  Completion page has a CSV download button.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[LOCAL TEST] Justice Study — Role Survey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8; color: #222;
      min-height: 100vh; display: flex;
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff; border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 2rem; max-width: 660px; width: 100%;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.75rem; color: #444; }
    p  { line-height: 1.6; margin-bottom: 0.75rem; color: #333; }
    .test-banner {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 6px; padding: 0.6rem 1rem;
      font-size: 0.85rem; margin-bottom: 1rem; color: #856404;
    }
    .progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: #5a7fc1; border-radius: 3px; transition: width 0.3s ease; }
    .scenario-text {
      font-size: 1.05rem; line-height: 1.65;
      background: #f9f9f9;
      border-left: 4px solid #5a7fc1;
      padding: 1rem 1.25rem;
      border-radius: 0 6px 6px 0;
      margin-bottom: 1rem;
    }
    .role-card {
      display: flex; align-items: center; gap: 0.6rem;
      background: #eef2fb; border: 1px solid #c5d0ee;
      border-radius: 8px; padding: 0.65rem 1rem;
      font-size: 0.9rem; margin-bottom: 1rem;
      color: #2a3d8a;
    }
    .role-card .role-icon { font-size: 1.2rem; }
    .role-card strong { font-weight: 700; }
    .question { font-weight: 600; margin-bottom: 1rem; }
    .response-buttons { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .response-btn {
      flex: 1; min-width: 100px;
      padding: 0.75rem 1rem;
      border: 2px solid #ccc; border-radius: 8px;
      background: #fff; font-size: 0.95rem; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .response-btn:hover { border-color: #5a7fc1; background: #eef2fb; }
    .response-btn.selected { border-color: #5a7fc1; background: #5a7fc1; color: #fff; }
    .btn-primary {
      display: block; width: 100%;
      padding: 0.85rem; background: #5a7fc1; color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      margin-top: 1.5rem; transition: background 0.15s;
    }
    .btn-primary:hover    { background: #4166a8; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-secondary {
      display: block; width: 100%;
      padding: 0.75rem; background: #fff; color: #5a7fc1;
      border: 2px solid #5a7fc1; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      margin-top: 0.75rem; transition: background 0.15s;
    }
    .btn-secondary:hover { background: #eef2fb; }
    label { display: block; margin-bottom: 0.4rem; font-weight: 500; }
    input, select {
      width: 100%; padding: 0.55rem 0.75rem;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 0.95rem; margin-bottom: 1rem;
    }
    .field-row { display: flex; gap: 1rem; }
    .field-row > div { flex: 1; }
    .hidden { display: none; }
    .small  { font-size: 0.85rem; color: #666; }
    .error  { color: #c0392b; font-size: 0.9rem; margin-top: 0.5rem; }
    .role-badge {
      display: inline-block;
      background: #5a7fc1; color: #fff;
      padding: 0.2rem 0.7rem; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600;
      margin-bottom: 1rem;
    }
    #debug-panel {
      position: fixed; bottom: 1rem; right: 1rem;
      width: 330px; max-height: 260px;
      background: #1e1e1e; color: #9cdcfe;
      border-radius: 8px; padding: 0.75rem;
      font-family: monospace; font-size: 0.78rem;
      overflow-y: auto; z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #debug-panel h3 { color: #569cd6; margin-bottom: 0.5rem; font-size: 0.82rem; }
    #debug-log div  { border-bottom: 1px solid #333; padding: 0.2rem 0; }
    .attn-pass { color: #4ec9b0; }
    .attn-fail { color: #f44747; }
    /* ── context word-click phase ── */
    .word-token { cursor:pointer; display:inline; border-radius:3px; padding:1px 3px; transition:background 0.12s; }
    .word-token:hover { background:#e8eef8; }
    .word-token.w-sel { background:#5a7fc1; color:#fff; border-radius:3px; }
    .click-rank { font-size:0.62rem; vertical-align:super; font-weight:700; margin-left:1px; }
    .context-prompt { font-size:0.92rem; color:#555; margin-bottom:0.6rem; font-style:italic; }
  </style>
</head>
<body>
<div class="card">

  <!-- CONSENT -->
  <div id="page-consent">
    <div class="test-banner">⚠ LOCAL TEST MODE — responses saved to localStorage, not Google Sheets</div>
    <h1 id="ui-consent-title"></h1>
    <p id="ui-consent-p1"></p>
    <p id="ui-consent-p2"></p>
    <p id="ui-consent-p3"></p>
    <p class="small" id="ui-consent-p4"></p>
    <div style="margin-top:1.25rem">
      <label><input type="checkbox" id="consent-check" style="width:auto;margin-right:0.5rem">
        <span id="ui-consent-label"></span></label>
    </div>
    <div style="margin-top:1rem">
      <label for="lang-select" id="ui-lang-label"></label>
      <select id="lang-select" onchange="translateUI(this.value)">
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>
    <button class="btn-primary" id="ui-btn-consent" onclick="startDemographics()"></button>
    <div class="error" id="err-consent"></div>
  </div>

  <!-- ROLE BRIEFING -->
  <div id="page-role" class="hidden">
    <h1 id="ui-role-title"></h1>
    <p id="ui-role-intro"></p>
    <div class="role-card">
      <span class="role-icon" id="role-icon"></span>
      <div>
        <div id="ui-role-label-line"></div>
        <div class="small" id="ui-role-desc"></div>
      </div>
    </div>
    <p id="ui-role-instruction"></p>
    <button class="btn-primary" id="ui-btn-role" onclick="show('page-demographics')"></button>
  </div>

  <!-- DEMOGRAPHICS -->
  <div id="page-demographics" class="hidden">
    <h1 id="ui-demo-title"></h1>
    <p class="small" style="margin-bottom:1rem" id="ui-demo-subtitle"></p>
    <label for="prolific-id" id="ui-label-prolific"></label>
    <input type="text" id="prolific-id" placeholder="e.g. test_participant_01" value="test_participant_01">
    <div class="field-row">
      <div>
        <label for="age" id="ui-label-age"></label>
        <input type="number" id="age" min="18" max="99" value="30">
      </div>
      <div>
        <label for="gender" id="ui-label-gender"></label>
        <select id="gender">
          <option value="" id="ui-gender-select"></option>
          <option value="Woman"     id="ui-gender-woman"></option>
          <option value="Man"       id="ui-gender-man"></option>
          <option value="Nonbinary" id="ui-gender-nonbinary"></option>
          <option value="Prefer"    id="ui-gender-prefer"></option>
        </select>
      </div>
    </div>
    <label for="country" id="ui-label-country"></label>
    <input type="text" id="country" value="Norway">
    <label for="first-language" id="ui-label-firstlang"></label>
    <input type="text" id="first-language" value="Norwegian">
    <button class="btn-primary" id="ui-btn-start" onclick="startSurvey()"></button>
    <div class="error" id="err-demo"></div>
  </div>

  <!-- SURVEY -->
  <div id="page-survey" class="hidden">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <h2 id="scenario-counter"></h2>
    <div id="role-badge-survey" class="role-badge"></div>
    <div class="scenario-text" id="scenario-text"></div>
    <div class="role-card" id="role-context-card">
      <span class="role-icon" id="survey-role-icon"></span>
      <span id="survey-role-context"></span>
    </div>
    <p class="question" id="question-text"></p>
    <div class="response-buttons" id="response-buttons"></div>
    <!-- context word-click phase (shown after rating) -->
    <div id="context-phase" class="hidden">
      <p class="context-prompt" id="ui-context-prompt">Which word(s) most influenced your judgment? Click them <strong>in order of importance</strong>. Click again to deselect.</p>
      <div class="scenario-text" id="scenario-text-ctx" style="line-height:2.2"></div>
      <p class="small" style="margin-top:0.6rem;color:#999" id="ui-context-skip">Nothing specific? Just click <em>Continue →</em>.</p>
    </div>
    <button class="btn-primary" id="btn-next" disabled onclick="nextScenario()"></button>
    <div class="error" id="err-survey"></div>
  </div>

  <!-- COMPLETION -->
  <div id="page-done" class="hidden">
    <h1 id="ui-done-title"></h1>
    <p id="ui-done-p1">— <span id="done-count"></span> —</p>
    <p id="ui-done-p2"></p>
    <p class="small" id="ui-done-p3"></p>
    <button class="btn-secondary" id="ui-btn-download" onclick="downloadCSV()"></button>
    <button class="btn-secondary" id="ui-btn-restart"  onclick="clearAndRestart()" style="margin-top:0.5rem"></button>
  </div>

</div>

<div id="debug-panel">
  <h3>Debug — responses so far</h3>
  <div id="debug-log"></div>
</div>

<script>
// =============================================================================
// Scenario data (mirrors role_survey.gs and test_role_dataset.py)
// =============================================================================
var SCENARIOS = [
  {id:"rj_exploit_commission",   en:"An employer takes all sales commission earned by their employee.",               fr:"Un employeur conserve toutes les commissions sur les ventes réalisées par son employé.",              agent_role:"employer",    target_role:"salesperson"},
  {id:"rj_exploit_intern",       en:"A company uses unpaid interns for months of skilled work.",                      fr:"Une entreprise utilise des stagiaires non rémunérés pendant des mois de travail qualifié.",           agent_role:"company",     target_role:"intern"},
  {id:"rj_exploit_franchise",    en:"A franchisor charges fees so high the franchisee cannot turn a profit.",         fr:"Un franchiseur impose des redevances si élevées que le franchisé ne peut réaliser aucun bénéfice.",   agent_role:"franchisor",  target_role:"franchisee"},
  {id:"rj_exploit_gig",          en:"A platform takes 40% of every payment earned by its gig workers.",              fr:"Une plateforme prélève 40 % de chaque paiement gagné par ses travailleurs indépendants.",            agent_role:"platform",    target_role:"gig worker"},

  {id:"rj_exploit_copyright",    en:"A record label takes full copyright of an artist's recordings by default.",     fr:"Une maison de disques prend par défaut tous les droits d'auteur sur les enregistrements d'un artiste.",agent_role:"record label",target_role:"artist"},
  {id:"rj_exploit_bonus",        en:"A CEO cancels the performance bonuses of staff after they meet all targets.",   fr:"Un PDG annule les primes de performance du personnel après que celui-ci a atteint tous ses objectifs.", agent_role:"CEO",         target_role:"employee"},

  {id:"rj_deceive_client",       en:"A lawyer conceals a conflict of interest while representing a client.",         fr:"Un avocat dissimule un conflit d'intérêts tout en représentant un client.",                          agent_role:"lawyer",      target_role:"client"},

  {id:"rj_coerce_employee",      en:"A manager pressures an employee to sign a non-compete under threat of firing.", fr:"Un manager pousse un employé à signer une clause de non-concurrence sous peine de licenciement.",     agent_role:"manager",     target_role:"employee"},
  {id:"rj_coerce_tenant",        en:"A landlord threatens eviction to force a tenant to accept worse conditions.",   fr:"Un propriétaire menace d'expulsion pour forcer un locataire à accepter de pires conditions.",         agent_role:"landlord",    target_role:"tenant"},

  {id:"rj_discriminate_promote", en:"A manager overlooks a qualified woman for promotion in favour of a less experienced man.", fr:"Un manager écarte une femme qualifiée pour une promotion au profit d'un homme moins expérimenté.", agent_role:"manager", target_role:"employee"},

  {id:"rj_discriminate_lend",    en:"A bank charges higher interest rates to applicants from a specific postcode.",  fr:"Une banque applique des taux d'intérêt plus élevés aux demandeurs d'un code postal spécifique.",     agent_role:"bank",        target_role:"applicant"},

  {id:"rj_discriminate_pay",     en:"An employer pays workers of one gender less for identical work.",               fr:"Un employeur paie les travailleurs d'un genre moins que les autres pour un travail identique.",       agent_role:"employer",    target_role:"employee"},
  {id:"rj_discriminate_assign",  en:"A teacher assigns the least desirable tasks to students from minority groups.", fr:"Un enseignant confie les tâches les moins valorisantes aux élèves issus de groupes minoritaires.",    agent_role:"teacher",     target_role:"student"},
  {id:"rj_discipline_child",     en:"A parent grounds a teenager for coming home an hour late.",                     fr:"Un parent prive un adolescent de sortie pour être rentré une heure en retard.",                       agent_role:"parent",      target_role:"teenager"},
  {id:"rj_discipline_employee",  en:"A manager gives a written warning to a consistently late employee.",            fr:"Un manager donne un avertissement écrit à un employé régulièrement en retard.",                      agent_role:"manager",     target_role:"employee"},
  {id:"rj_discipline_student",   en:"A teacher detains a student for disrupting the class repeatedly.",              fr:"Un enseignant retient un élève pour avoir perturbé la classe à plusieurs reprises.",                 agent_role:"teacher",     target_role:"student"},
  {id:"rj_discipline_player",    en:"A coach drops a player from the team after they skip training without notice.", fr:"Un entraîneur exclut un joueur de l'équipe après qu'il a manqué un entraînement sans préavis.",       agent_role:"coach",       target_role:"player"},

  {id:"rj_discipline_member",    en:"A committee suspends a member who violated the code of conduct.",               fr:"Un comité suspend un membre qui a violé le code de conduite.",                                       agent_role:"committee",   target_role:"member"},
  {id:"rj_discipline_intern",    en:"A firm terminates an intern found sharing confidential documents externally.",  fr:"Une entreprise met fin au contrat d'un stagiaire surpris à partager des documents confidentiels.",    agent_role:"firm",        target_role:"intern"},
  {id:"rj_discipline_subordinate",en:"A manager publicly criticises a subordinate's work in a team meeting.",       fr:"Un manager critique publiquement le travail d'un subordonné lors d'une réunion d'équipe.",            agent_role:"manager",     target_role:"subordinate"},
  {id:"rj_compete_market",       en:"A supermarket chain opens a store next to a small independent grocer.",         fr:"Une chaîne de supermarchés ouvre un magasin à côté d'un épicier indépendant.",                       agent_role:"chain",       target_role:"grocer"},
  {id:"rj_compete_election",     en:"A candidate runs a negative campaign targeting their opponent's record.",       fr:"Un candidat mène une campagne négative ciblant le bilan de son adversaire.",                         agent_role:"candidate",   target_role:"opponent"},
  {id:"rj_compete_promotion",    en:"A colleague lobbies management intensively to be selected over a peer.",        fr:"Un collègue fait pression intensément auprès de la direction pour être sélectionné plutôt qu'un pair.", agent_role:"colleague",  target_role:"peer"},
  {id:"rj_compete_scholarship",  en:"A student applies for the same competitive scholarship as their close friend.", fr:"Un étudiant postule à la même bourse compétitive que son ami proche.",                               agent_role:"student",     target_role:"friend"},
  {id:"rj_compete_contract",     en:"A firm undercuts a rival's bid to win a government contract.",                  fr:"Une entreprise propose un prix inférieur à celui d'un concurrent pour remporter un contrat public.",  agent_role:"firm",        target_role:"rival"},
  {id:"rj_compete_grant",        en:"A researcher submits to the same funding call as a former collaborator.",       fr:"Un chercheur soumet une candidature au même appel à financement qu'un ancien collaborateur.",          agent_role:"researcher",  target_role:"collaborator"},
  {id:"rj_compete_award",        en:"An artist submits to a prize knowing their mentor is also competing.",          fr:"Un artiste soumet à un prix en sachant que son mentor concourt également.",                          agent_role:"artist",      target_role:"mentor"},

// =============================================================================
var google = {
  script: {
    run: {
      _s: null, _f: null,
      withSuccessHandler: function(fn) { this._s = fn; return this; },
      withFailureHandler: function(fn) { this._f = fn; return this; },
      getScenariosForSession: function(role, lang) {
        var self = this;
        setTimeout(function() { self._s && self._s(mockGetScenarios()); }, 50);
      },
      getResponseLabels: function(lang) {
        var self = this;
        setTimeout(function() {
          var labels = RESPONSE_LABELS[lang] || RESPONSE_LABELS.en;
          var result = RESPONSE_VALUES.map(function(v,i) { return {value:v, label:labels[i]}; });
          self._s && self._s(result);
        }, 30);
      },
      submitResponse: function(pid, sid, resp, role, agentRole, targetRole, age, gender, country, lang) {
        var self = this;
        setTimeout(function() {
          mockSubmit(pid, sid, resp, role, agentRole, targetRole, age, gender, country, lang);
          self._s && self._s({ok: true});
        }, 30);
      }
    }
  }
};

function mockGetScenarios() {
  var pool = SCENARIOS.slice();
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  pool = pool.slice(0, 20);
  pool.splice(5,  0, ATTENTION_CHECKS[0]);
  pool.splice(14, 0, ATTENTION_CHECKS[1]);
  return pool;
}

function mockSubmit(pid, sid, resp, role, agentRole, targetRole, age, gender, country, lang, contextWords) {
  var stored = JSON.parse(localStorage.getItem("cogemi_role_responses") || "[]");
  stored.push({ timestamp: new Date().toISOString(), prolific_id: pid,
    scenario_id: sid, response: resp, role_perspective: role,
    agent_role: agentRole, target_role: targetRole,
    context_words: contextWords || "",
    age: age, gender: gender, country: country, language: lang });
  localStorage.setItem("cogemi_role_responses", JSON.stringify(stored));
  debugLog(sid, resp, role);
}

function show(id) {
  ["page-consent","page-role","page-demographics","page-survey","page-done"].forEach(function(p) {
    document.getElementById(p).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function startDemographics() {
  state.lang = document.getElementById("lang-select").value;
  if (!document.getElementById("consent-check").checked) {
    document.getElementById("err-consent").textContent = ERR_CONSENT[state.lang];
    return;
  }
  translateUI(state.lang);
  // Assign role if not set via URL
  if (!state.role) {
    var roles = ["agent", "target", "observer"];
    state.role = roles[Math.floor(Math.random() * 3)];
  }
  updateRoleBriefing(state.lang);
  show("page-role");
}

function updateRoleBriefing(lang) {
  var t = UI_TEXT[lang] || UI_TEXT.en;
  var rl = ROLE_LABELS[lang] || ROLE_LABELS.en;
  document.getElementById("role-icon").textContent = ROLE_ICONS[state.role] || "👤";
  document.getElementById("ui-role-intro").innerHTML = (ROLE_BRIEFING[state.role] || {})[lang] || (ROLE_BRIEFING[state.role] || {}).en || "";
  document.getElementById("ui-role-label-line").innerHTML = "<strong>" + (rl[state.role] || state.role) + "</strong>";
  document.getElementById("ui-role-desc").textContent = (ROLE_DESCS[state.role] || {})[lang] || "";
  document.getElementById("ui-role-instruction").textContent = "";
}

function startSurvey() {
  var pid = document.getElementById("prolific-id").value.trim();
  var age = document.getElementById("age").value.trim();
  var gen = document.getElementById("gender").value;
  var cty = document.getElementById("country").value.trim();
  var fl  = document.getElementById("first-language").value.trim();
  if (!pid || !age || !gen || !cty || !fl) {
    document.getElementById("err-demo").textContent = ERR_DEMO[state.lang];
    return;
  }
  state.prolificId = pid; state.age = age; state.gender = gen;
  state.country = cty; state.firstLang = fl;

  google.script.run
    .withSuccessHandler(function(scenarios) {
      state.scenarios = scenarios;
      google.script.run
        .withSuccessHandler(function(labels) {
          state.labels = labels;
          show("page-survey");
          renderScenario();
        })
        .getResponseLabels(state.lang);
    })
    .getScenariosForSession(state.role, state.lang);
}

// =============================================================================
// Survey rendering
// =============================================================================
function renderScenario() {
  var s     = state.scenarios[state.current];
  var total = state.scenarios.length;
  var sit   = SITUATION_LABEL[state.lang] || SITUATION_LABEL.en;
  var rl    = ROLE_LABELS[state.lang] || ROLE_LABELS.en;

  document.getElementById("scenario-counter").textContent =
    sit[0] + " " + (state.current + 1) + " " + sit[1] + " " + total;
  document.getElementById("progress-fill").style.width =
    Math.round((state.current / total) * 100) + "%";

  // Role badge
  document.getElementById("role-badge-survey").textContent =
    (ROLE_ICONS[state.role] || "") + " " + (rl[state.role] || state.role);

  document.getElementById("scenario-text").textContent = s[state.lang] || s.en || s.text || "";

  // Role context card
  var roleForCard = state.role === "agent" ? s.agent_role : (state.role === "target" ? s.target_role : null);
  var ctxTemplate = (ROLE_CONTEXT_LINES[state.role] || {})[state.lang] || "";
  var ctxText = ctxTemplate
    .replace("{role}",   roleForCard || state.role)
    .replace("{agent}",  s.agent_role || "agent")
    .replace("{target}", s.target_role || "target");
  document.getElementById("survey-role-icon").textContent = ROLE_ICONS[state.role] || "";
  document.getElementById("survey-role-context").innerHTML = ctxText;

  // Question
  var qTemplate = (ROLE_QUESTIONS[state.role] || {})[state.lang] || "";
  var qText = qTemplate
    .replace("{role}",   roleForCard || state.role)
    .replace("{agent}",  s.agent_role || "agent")
    .replace("{target}", s.target_role || "target");
  document.getElementById("question-text").textContent = qText;

  // Response buttons
  var container = document.getElementById("response-buttons");
  container.innerHTML = "";
  state.labels.forEach(function(item) {
    var btn = document.createElement("button");
    btn.className = "response-btn";
    btn.textContent = item.label;
    btn.onclick = function() { selectResponse(item.value, btn); };
    container.appendChild(btn);
  });

  document.getElementById("btn-next").textContent =
    (UI_TEXT[state.lang] || UI_TEXT.en)["btn-next"] + " \u2192";
  state.selected = null;
  state.phase = "rating";
  state.pendingRating = null;
  state.clickedWords = [];
  document.getElementById("context-phase").classList.add("hidden");
  document.getElementById("response-buttons").style.display = "";
  document.getElementById("question-text").style.display = "";
  document.getElementById("btn-next").disabled = true;
  document.getElementById("err-survey").textContent = "";
}

function selectResponse(value, btn) {
  document.querySelectorAll(".response-btn").forEach(function(b) { b.classList.remove("selected"); });
  btn.classList.add("selected");
  state.selected = value;
  document.getElementById("btn-next").disabled = false;
}

function nextScenario() {
  if (state.phase === "rating") {
    if (!state.selected) return;
    state.pendingRating = state.selected;
    enterContextPhase();
    return;
  }
  // phase === "context" — submit and advance
  var s = state.scenarios[state.current];
  var contextWords = state.clickedWords
    .sort(function(a, b) { return a.rank - b.rank; })
    .map(function(w) { return w.word; }).join("|");
  document.getElementById("btn-next").disabled = true;

  google.script.run
    .withSuccessHandler(function(result) {
      if (!result.ok) {
        document.getElementById("err-survey").textContent = "Save error — try again.";
        document.getElementById("btn-next").disabled = false;
        return;
      }
      state.current++;
      if (state.current >= state.scenarios.length) {
        document.getElementById("done-count").textContent = state.scenarios.length;
        translateUI(state.lang);
        show("page-done");
        document.getElementById("debug-panel").style.display = "none";
      } else {
        renderScenario();
      }
    })
    .submitResponse(
      state.prolificId, s.id, state.pendingRating, state.role,
      s.agent_role, s.target_role,
      state.age, state.gender, state.country, state.lang, contextWords
    );
}

function enterContextPhase() {
  state.phase = "context";
  state.clickedWords = [];
  document.getElementById("response-buttons").style.display = "none";
  document.getElementById("question-text").style.display = "none";
  document.getElementById("context-phase").classList.remove("hidden");
  var s = state.scenarios[state.current];
  buildClickableText(s[state.lang] || s.en || s.text || "", "scenario-text-ctx");
  document.getElementById("btn-next").textContent = "Continue \u2192";
  document.getElementById("btn-next").disabled = false;
  document.getElementById("err-survey").textContent = "";
}

function buildClickableText(text, containerId) {
  var container = document.getElementById(containerId);
  container.innerHTML = "";
  text.split(/(\s+)/).forEach(function(token, i) {
    if (/^\s+$/.test(token)) {
      container.appendChild(document.createTextNode(token));
      return;
    }
    var outer = document.createElement("span");
    outer.className = "word-token";
    outer.dataset.clean = token.replace(/[^a-zA-Z0-9'\u2019-]/g, "").toLowerCase();
    outer.dataset.tidx = i;
    var textNode = document.createElement("span");
    textNode.textContent = token;
    outer.appendChild(textNode);
    var badge = document.createElement("sup");
    badge.className = "click-rank";
    badge.style.display = "none";
    outer.appendChild(badge);
    outer.onclick = function() { toggleWord(outer); };
    container.appendChild(outer);
  });
}

function toggleWord(span) {
  var tidx = parseInt(span.dataset.tidx);
  var badge = span.querySelector(".click-rank");
  if (span.classList.contains("w-sel")) {
    state.clickedWords = state.clickedWords.filter(function(w) { return w.tidx !== tidx; });
    span.classList.remove("w-sel");
    badge.style.display = "none";
    renumberWords();
  } else {
    var rank = state.clickedWords.length + 1;
    state.clickedWords.push({ word: span.dataset.clean, tidx: tidx, rank: rank });
    span.classList.add("w-sel");
    badge.textContent = rank;
    badge.style.display = "";
  }
}

function renumberWords() {
  state.clickedWords.sort(function(a, b) { return a.rank - b.rank; });
  state.clickedWords.forEach(function(w, i) { w.rank = i + 1; });
  document.querySelectorAll("#scenario-text-ctx .word-token.w-sel").forEach(function(sp) {
    var tidx = parseInt(sp.dataset.tidx);
    var entry = state.clickedWords.find(function(w) { return w.tidx === tidx; });
    if (entry) {
      var b = sp.querySelector(".click-rank");
      if (b) { b.textContent = entry.rank; b.style.display = ""; }
    }
  });
}

// =============================================================================
// Debug panel
// =============================================================================
function debugLog(sid, response, role) {
  var stored = JSON.parse(localStorage.getItem("cogemi_role_responses") || "[]");
  var log    = document.getElementById("debug-log");
  var entry  = document.createElement("div");
  var attn   = ATTENTION_CHECKS.find(function(a) { return a.id === sid; });
  var suffix = "";
  if (attn) {
    suffix = response === attn.expected
      ? '<span class="attn-pass"> ✓ attn pass</span>'
      : '<span class="attn-fail"> ✗ attn FAIL (exp: ' + attn.expected + ')</span>';
  }
  entry.innerHTML = "<strong>" + stored.length + ".</strong> [" + role + "] " +
    sid.replace("rj_","") + " → " + response + suffix;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

// =============================================================================
// CSV download / restart
// =============================================================================
function downloadCSV() {
  var data = JSON.parse(localStorage.getItem("cogemi_role_responses") || "[]");
  if (!data.length) { alert("No responses found."); return; }
  var header = ["timestamp","prolific_id","scenario_id","response","role_perspective",
                "context_words","agent_role","target_role","age","gender","country","language"];
  var rows = data.map(function(r) {
    return header.map(function(k) { return '"' + (r[k] || "") + '"'; }).join(",");
  });
  var csv  = header.join(",") + "\n" + rows.join("\n");
  var blob = new Blob([csv], { type: "text/csv" });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href = url; a.download = "cogemi_role_responses.csv"; a.click();
  URL.revokeObjectURL(url);
}

function clearAndRestart() {
  localStorage.removeItem("cogemi_role_responses");
  location.reload();
}
</script>
