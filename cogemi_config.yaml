# COGEMI LLM configuration
# Copy/edit this file to change the LLM provider and model.
#
# Provider options:
#   ollama   — local Ollama server (default)
#   openai   — any OpenAI-compatible API (OpenAI, Mistral, Together, etc.)
#
# For openai provider, set the api_key here or via the COGEMI_API_KEY
# environment variable (env var takes precedence).

llm:
  provider: ollama
  model: qwen3:1.7b
  base_url: http://localhost:11434
  # api_key: ""
